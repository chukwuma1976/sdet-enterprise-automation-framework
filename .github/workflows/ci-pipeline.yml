name: Automation Pipeline

on:
  push:
    branches: [ main, feature/automation-testing ]
  pull_request:
    branches: [ main ]

jobs:

  api-health-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run API Health Check
      run: |
        chmod +x scripts/health-check.sh
        ./scripts/health-check.sh


  api-tests:
    needs: api-health-check
    runs-on: ubuntu-latest

    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      API_AUTH_BASE_URL: ${{ secrets.API_AUTH_BASE_URL }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: maven

    - name: Run API Tests
      run: mvn test -Dgroups=api
      continue-on-error: true

    - name: Upload API Allure Results
      uses: actions/upload-artifact@v4
      with:
        name: api-allure-results
        path: target/allure-results


  playwright-tests:
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ secrets.BASE_URL }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: maven

    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright
        
    - name: Install Playwright Browsers
      run: mvn exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install"

    - name: Run Playwright Tests
      run: mvn -B test -Dgroups=playwright
      continue-on-error: true

    - name: Upload Playwright Allure Results
      uses: actions/upload-artifact@v4
      with:
        name: playwright-allure-results
        path: target/allure-results


  selenium-tests:
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ secrets.BASE_URL }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: maven

    - name: Install Chrome
      uses: browser-actions/setup-chrome@v1

    - name: Run Selenium Tests
      run: mvn -B test -Dgroups=selenium
      continue-on-error: true

    - name: Upload Selenium Allure Results
      uses: actions/upload-artifact@v4
      with:
        name: ui-selenium-results
        path: target/allure-results  


  performance-tests:
    needs: api-tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install k6
      run: |
        sudo apt-get update
        sudo apt-get install -y gnupg
        curl https://dl.k6.io/key.gpg | sudo apt-key add -
        echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6

    - name: Run Performance Tests
      run: |
        chmod +x scripts/run-performance-tests.sh
        ./scripts/run-performance-tests.sh

    - name: Upload Performance Reports
      uses: actions/upload-artifact@v4
      with:
        name: k6-performance-reports
        path: performance-tests/results/*.html
        

  publish-report:
    needs: [api-tests, playwright-tests, selenium-tests]
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download API Results
      uses: actions/download-artifact@v4
      with:
        name: api-allure-results
        path: api-results

    - name: Download Playwright Results
      uses: actions/download-artifact@v4
      with:
        name: playwright-allure-results
        path: playwright-results

    - name: Download Selenium Results
      uses: actions/download-artifact@v4
      with:
        name: ui-selenium-results
        path: selenium-results

    - name: Merge Allure Results
      run: |
        mkdir -p target/allure-results
        cp -r api-results/* target/allure-results || true
        cp -r playwright-results/* target/allure-results || true
        cp -r selenium-results/* target/allure-results || true

    - name: Generate Unified Allure Report
      run: mvn allure:report

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: target/site/allure-maven-plugin

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4