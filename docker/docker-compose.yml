version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: orangehrm-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orangehrm
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  orangehrm:
    image: orangehrm/orangehrm
    container_name: orangehrm
    ports:
      - "8080:80"
    depends_on:
      - mysql
    links:
      - mysql:mysql

volumes:
  mysql_data: